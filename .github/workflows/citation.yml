on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
name: CITATION.cff
jobs:
  Validate-CITATION-cff:
    runs-on: ubuntu-latest
    name: Validate CITATION.cff
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate CITATION.cff
        uses: dieghernan/cff-validator@v5
